<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App</title>

<link rel="stylesheet" href="src/output.css">
</head>

<body
class="min-h-screen flex justify-center items-center bg-cover bg-center p-6"
style="background-image:url('https://images.unsplash.com/photo-1534088568595-a066f410bcda?q=80&w=1920');"
>

<div
class="backdrop-blur-xl bg-white/35 border border-white/20
w-full max-w-[950px] rounded-[35px] shadow-2xl p-10 text-white"
>

<h1 class="text-5xl font-bold text-center mb-3">
Weather Forecast
</h1>

<p class="text-center text-gray-200 text-lg mb-10">
Search any city for live weather updates
</p>

<div class="flex flex-col md:flex-row gap-5">

<input
id="cityInput"
type="text"
placeholder="Search city..."
class="flex-1 px-6 py-5 rounded-2xl bg-white/20
placeholder:text-gray-300 text-white text-xl
outline-none border border-white/20 focus:border-blue-400"
/>

<button
id="searchBtn"
class="bg-blue-500 hover:bg-blue-600 transition duration-300
px-10 py-5 rounded-2xl text-xl font-bold shadow-lg"
>
Search
</button>

</div>



<div
id="weatherBox"
class="hidden mt-10 bg-white/10 rounded-3xl p-10 border border-white/20"
>

<h2
id="cityName"
class="text-4xl font-bold text-center mb-3"
></h2>

<p
id="temp"
class="text-7xl font-bold text-center mb-4"
></p>

<p
id="desc"
class="text-2xl text-center capitalize text-gray-200 mb-8"
></p>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="bg-white/10 rounded-2xl p-6 text-center">

<h3 class="text-black mb-2 text-lg">
Humidity
</h3>

<p
id="humidity"
class="text-3xl font-bold"
></p>

</div>

<div class="bg-white/10 rounded-2xl p-6 text-center">

<h3 class="text-black mb-2 text-lg">
Wind Speed
</h3>

<p
id="wind"
class="text-3xl font-bold"
></p>

</div>


</div>

</div>

</div>

<script src="env.js"></script>

<script>

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");

searchBtn.addEventListener("click", () => {

const city = cityInput.value.trim();

if (!city) {
alert("Please enter a city");
return;
}

fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`)

.then(res => res.json())

.then(data => {

console.log(data);

if (data.cod !== 200) {
alert("City not found");
return;
}

document.getElementById("cityName").textContent =
data.name;

document.getElementById("temp").textContent =
Math.round(data.main.temp) + "°C";

document.getElementById("desc").textContent =
data.weather[0].description;

document.getElementById("humidity").textContent =
data.main.humidity + "%";

document.getElementById("wind").textContent =
data.wind.speed + " m/s";

// document.getElementById("feelsLike").textContent =
// Math.round(data.main.feels_like) + "°C";

document
.getElementById("weatherBox")
.classList.remove("hidden");

})

.catch(err => {
console.log("Error:", err);
alert("Something went wrong.");
});

});

</script>

</body>
</html>
