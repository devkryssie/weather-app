<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex justify-center items-center">

<div class="bg-pink-400 w-[90%] max-w-[900px] p-10 rounded-[40px] shadow-2xl">

<h1 class="text-white text-5xl font-bold text-center mb-10">
Get A Location Weather
</h1>

<div class="flex gap-4">

<input
id="cityInput"
type="text"
placeholder="Enter city..."
class="flex-1 p-5 rounded-2xl text-2xl outline-none"
/>

<button
id="searchBtn"
class="bg-white text-blue-600 font-bold px-10 py-5 rounded-2xl text-2xl"
>
Search
</button>

</div>

<!-- Weather Result -->

<div id="weatherBox" class="hidden mt-10 bg-white p-8 rounded-3xl text-center">

<h2 id="cityName" class="text-4xl font-bold text-blue-600 mb-4"></h2>

<p id="temp" class="text-6xl font-bold mb-4"></p>

<p id="desc" class="text-2xl mb-6"></p>

<div class="space-y-3 text-xl">

<p>Humidity: <span id="humidity"></span></p>
<p>Wind Speed: <span id="wind"></span></p>
<p>Feels Like: <span id="feelsLike"></span></p>

</div>

</div>

</div>
<script src="env.js"></script>
<script>

// const API_KEY = "42fc046c6a60eda2832e17efd9363cc5";

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");

searchBtn.addEventListener("click", () => {

const city = cityInput.value;

if (!city) {
alert("Please enter a city");
return;
}

fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`)
.then(res => res.json())
.then(data => {

if (data.cod !== 200) {
alert("City not found");
return;
}

document.getElementById("cityName").textContent = data.name;
document.getElementById("temp").textContent = Math.round(data.main.temp) + "°C";
document.getElementById("desc").textContent = data.weather[0].description;
document.getElementById("humidity").textContent = data.main.humidity + "%";
document.getElementById("wind").textContent = data.wind.speed + " m/s";
document.getElementById("feelsLike").textContent = Math.round(data.main.feels_like) + "°C";

document.getElementById("weatherBox").classList.remove("hidden");

})
.catch(err => {
console.log("Error:", err);
});

});
</script>

</body>
</html>
